name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  checks:
    name: Prerequisite Checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [checks]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: ./scripts/package.sh /tmp/codeseeq-release.zip

      - name: Validate package
        run: ./scripts/package.sh --check-archive /tmp/codeseeq-release.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CodeSeeq ${{ github.ref_name }}
          body_path: RELEASE-NOTES.md
          files: /tmp/codeseeq-release.zip
          draft: false
          prerelease: false
