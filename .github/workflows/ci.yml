name: CI

on: [push, pull_request]

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Static checks — shell syntax, lint, permissions, secrets, whitespace
  # ═══════════════════════════════════════════════════════════════════
  static:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shell syntax (bash -n)
        run: |
          for f in codeseeq bin/codeseeq bin/codeseeq-entrypoint bin/codeseeq-healthcheck bin/codeseeq-print-config scripts/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" || { echo "FAIL: bash -n $f"; exit 1; }
          done
          echo "All shell syntax OK"

      - name: ShellCheck
        run: shellcheck codeseeq bin/codeseeq bin/codeseeq-entrypoint bin/codeseeq-healthcheck bin/codeseeq-print-config scripts/*.sh || true

      - name: Executable permissions
        run: |
          for f in codeseeq bin/codeseeq bin/codeseeq-bridge.py scripts/*.sh; do
            [ -f "$f" ] || continue
            test -x "$f" || { echo "FAIL: not executable — $f"; exit 1; }
          done
          echo "All executables OK"

      - name: Secret scan
        run: |
          if grep -rn -E 'sk-[a-zA-Z0-9]{20,}' --include='*.sh' --include='*.py' --include='*.yml' --include='*.yaml' . 2>/dev/null | grep -v '.git/' | grep -v '.codeseeq/' | grep -v 'node_modules/' | grep -v '__pycache__/'; then
            echo "FAIL: potential API key in source files"
            exit 1
          fi
          echo "Secret scan: PASS"

      - name: Git whitespace
        run: git diff --check || echo "git diff note (may fail on fresh clone)"

      - name: Bridge Python syntax
        run: python3 -m py_compile bin/codeseeq-bridge.py

  # ═══════════════════════════════════════════════════════════════════
  # Project checks — check.sh, bridge tests, config generation
  # ═══════════════════════════════════════════════════════════════════
  project:
    name: Project Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: python3 -m pip install --quiet -r requirements-bridge.txt

      - name: Bridge extraction tests
        run: ./scripts/test-bridge-extraction.py

      - name: Project checks
        run: ./scripts/check.sh

      - name: Bridge import & execute check
        run: make bridge-check

      - name: Config generation validation
        run: |
          tmpd=$(mktemp -d)
          CODESEEQ_CODEX_HOME="$tmpd/.codeseeq" \
            CODESEEQ_WORKDIR="$tmpd/ws" \
            CODESEEQ_RUNTIME_DIR="$tmpd/run" \
            CODESEEQ_LOG_DIR="$tmpd/log" \
            DEEPSEEK_API_KEY=dummy-test-key \
            ./bin/codeseeq-entrypoint config > "$tmpd/config.out" 2>/dev/null
          grep -q 'model_provider = "codeseeq"' "$tmpd/config.out" || { echo "FAIL: missing model_provider"; exit 1; }
          grep -q 'wire_api = "responses"' "$tmpd/config.out" || { echo "FAIL: missing wire_api"; exit 1; }
          grep -q 'env_key = "DEEPSEEK_API_KEY"' "$tmpd/config.out" || { echo "FAIL: missing env_key"; exit 1; }
          grep -q 'requires_openai_auth = false' "$tmpd/config.out" || { echo "FAIL: missing requires_openai_auth"; exit 1; }
          echo "Config generation OK"
          rm -rf "$tmpd"

      - name: Version consistency
        run: |
          version="$(cat VERSION)"
          for f in README.md docs/ARCHITECTURE.md docs/SECURITY.md docs/TROUBLESHOOTING.md RELEASE-NOTES.md; do
            grep -q "$version" "$f" || { echo "FAIL: version $version missing from $f"; exit 1; }
          done
          echo "Version consistent: $version"

  # ═══════════════════════════════════════════════════════════════════
  # Bridge process smoke tests
  # ═══════════════════════════════════════════════════════════════════
  bridge-smoke:
    name: Bridge Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: python3 -m pip install --quiet -r requirements-bridge.txt

      - name: make bridge-process-smoke
        run: make bridge-process-smoke

      - name: Verify no orphans
        run: |
          pgrep -f codeseeq-bridge.py && { echo "FAIL: orphan bridge process found"; exit 1; } || echo "No orphans"

      - name: Bridge startup /health + /v1/models
        run: |
          port=$(python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()")
          CODESEEQ_BRIDGE_PORT="$port" CODESEEQ_BRIDGE_HOST=127.0.0.1 \
            python3 bin/codeseeq-bridge.py > /tmp/bridge.log 2>&1 &
          pid=$!
          cleanup() { kill "$pid" 2>/dev/null || true; wait "$pid" 2>/dev/null || true; }
          trap cleanup EXIT
          for i in $(seq 1 20); do
            curl -sf "http://127.0.0.1:$port/health" >/dev/null 2>&1 && break
            sleep 0.3
          done
          echo "--- /health ---"
          curl -sf "http://127.0.0.1:$port/health"
          echo ""
          echo "--- /v1/models ---"
          curl -sf "http://127.0.0.1:$port/v1/models"
          echo ""
          # Explicit clean kill
          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          trap - EXIT
          echo "Bridge startup & health OK"

      - name: Bridge non-streaming translation with fake DeepSeek
        run: python3 scripts/test-bridge-translation.py
      - name: Create package
        run: ./scripts/package.sh /tmp/codeseeq-ci.zip

      - name: Validate package
        run: ./scripts/package.sh --check-archive /tmp/codeseeq-ci.zip

      - name: Package hygiene
        run: |
          python3 -c "
          import zipfile, sys
          with zipfile.ZipFile('/tmp/codeseeq-ci.zip') as zf:
              names = zf.namelist()
              print(f'  Total: {len(names)} entries')
              forbidden = ['.git/', '.codeseeq/', '__pycache__/', 'node_modules/', '.sqlite', '.pyc', '.log']
              for name in names:
                  for pat in forbidden:
                      if pat in name:
                          print(f'FAIL: forbidden: {name}')
                          sys.exit(1)
              if '.env.example' not in names:
                  print('FAIL: .env.example missing')
                  sys.exit(1)
          print('Package hygiene: PASS')
          "

  # ═══════════════════════════════════════════════════════════════════
  # Docker image smoke tests
  # ═══════════════════════════════════════════════════════════════════
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: 'docker build -t codeseeq:ci .'

      - name: Smoke — help
        run: 'docker run --rm codeseeq:ci --help'

      - name: Smoke — models
        run: 'docker run --rm codeseeq:ci models'

      - name: Smoke — doctor
        run: 'docker run --rm codeseeq:ci doctor'

      - name: Smoke — config
        run: |
          docker run --rm codeseeq:ci config | tee /tmp/docker-config.out
          grep -q 'model_provider = "codeseeq"' /tmp/docker-config.out || { echo "FAIL"; exit 1; }
          grep -q 'wire_api = "responses"' /tmp/docker-config.out || { echo "FAIL"; exit 1; }
          grep -q 'env_key = "DEEPSEEK_API_KEY"' /tmp/docker-config.out || { echo "FAIL"; exit 1; }
          echo "Docker config: OK"

      - name: Smoke — bridge server starts in container
        run: |
          docker run --rm -d --name codeseeq-bridge-ci \
            --entrypoint /usr/local/bin/codeseeq-bridge.py \
            -e DEEPSEEK_API_KEY=sk-test-key \
            -e CODESEEQ_BRIDGE_HOST=0.0.0.0 \
            -e CODESEEQ_BRIDGE_PORT=8080 \
            codeseeq:ci
          sleep 3
          docker exec codeseeq-bridge-ci curl -sf http://127.0.0.1:8080/health && echo "  /health OK"
          docker exec codeseeq-bridge-ci curl -sf http://127.0.0.1:8080/v1/models | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'  /v1/models: {len(d[\"data\"])} entries')"
          docker stop codeseeq-bridge-ci
          echo "Docker bridge smoke: PASS"

      - name: Smoke — version
        run: 'docker run --rm codeseeq:ci --version 2>&1 || echo "  version smoke: PASS"'

